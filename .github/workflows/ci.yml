name: Continuous Integration

on:
  push:
    branches: [main, develop]
    tags:
      - "v*"
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_DEFAULT: "3.11"
  PACKAGE_NAME: derim-middleware
  COVERAGE_FILE: coverage.xml

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: pip
          cache-dependency-path: |
            requirements/base.txt
            requirements/dev.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/base.txt -r requirements/dev.txt
          pip install -e .

      - name: Run Ruff linter
        run: ruff check src tests

      - name: Run Ruff formatter check
        run: ruff format --check src tests

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: pip
          cache-dependency-path: |
            requirements/base.txt
            requirements/dev.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/base.txt -r requirements/dev.txt
          pip install -e .

      - name: Run MyPy
        run: mypy src/derim

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements/base.txt
            requirements/dev.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/base.txt -r requirements/dev.txt
          pip install -e .

      - name: Run pytest with coverage
        run: |
          pytest tests/ -v \
            --cov=src/derim \
            --cov-report=xml:${{ env.COVERAGE_FILE }} \
            --cov-report=term-missing \
            --tb=short

      - name: Upload coverage artifact
        if: matrix.python-version == env.PYTHON_DEFAULT
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ${{ env.COVERAGE_FILE }}
          if-no-files-found: error

  package:
    name: Package Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: pip
          cache-dependency-path: |
            requirements/base.txt
            requirements/dev.txt
            pyproject.toml

      - name: Install packaging tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build distributions
        run: python -m build

      - name: Validate distributions
        run: twine check dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*
          if-no-files-found: error

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: derim-middleware:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test Docker image
        run: |
          docker run -d --name derim-middleware-ci -p 8000:8000 derim-middleware:ci
          for attempt in $(seq 1 20); do
            if curl -fsS http://localhost:8000/health; then
              break
            fi
            sleep 3
          done
          curl -fsS http://localhost:8000/health
          docker logs derim-middleware-ci
          docker stop derim-middleware-ci

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: pip
          cache-dependency-path: |
            requirements/base.txt
            requirements/dev.txt
            pyproject.toml

      - name: Install dependencies and security tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/base.txt -r requirements/dev.txt
          pip install -e .
          pip install bandit[toml] pip-audit

      - name: Run Bandit static analysis
        run: bandit -r src/derim -c .bandit.yml -f screen

      - name: Run dependency vulnerability audit
        run: pip-audit -r requirements/base.txt --progress-spinner off

  release-readiness:
    name: Release Readiness
    runs-on: ubuntu-latest
    needs: [package, docker, security]
    if: github.event_name != 'pull_request'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Verify release tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PACKAGE_VERSION=$(python - <<'PY'
          import pathlib, re
          text = pathlib.Path('pyproject.toml').read_text()
          match = re.search(r'^version\s*=\s*"([^"]+)"', text, re.MULTILINE)
          print(match.group(1))
          PY
          )
          test "$TAG_VERSION" = "$PACKAGE_VERSION"

      - name: Summarize release artifacts
        run: |
          echo "Validated artifacts:" >> "$GITHUB_STEP_SUMMARY"
          ls -1 dist >> "$GITHUB_STEP_SUMMARY"
